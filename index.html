<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanizador de Texto Académico</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="main-container">
        <header class="header">
            <h1>Humanizador de Texto Académico</h1>
            <p>Ajuste de perplejidad y burstiness para textos universitarios</p>
        </header>

        <section class="workspace">
            <div class="card">
                <label for="inputText">Texto original (Detectado como IA):</label>
                <textarea id="inputText" placeholder="Pega aquí el párrafo de la tesis generado por ChatGPT..."></textarea>
            </div>

            <div class="card">
                <label for="outputText">Resultado (Baja detectabilidad):</label>
                <textarea id="outputText" readonly placeholder="El texto reescrito por la IA aparecerá aquí..."></textarea>
            </div>
        </section>

        <div id="turnitinMeter" class="meter-container" style="display: none;">
            <div class="meter-text">
                <span>Probabilidad de evadir Turnitin: <strong id="meterPercentage">0%</strong></span>
                <span id="meterStatus" class="status-safe">Seguro</span>
            </div>
            <div class="meter-bar">
                <div id="meterFill" class="meter-fill"></div>
            </div>
        </div>
        
        <div class="actions-bar">
            <button id="btnProcess" class="btn-primary" onclick="humanizeText()">Humanizar Texto ✨</button>
            <button id="btnCopy" class="btn-secondary" onclick="copyToClipboard()">Copiar Resultado 📋</button>
            <button id="btnClear" class="btn-secondary" onclick="clearFields()">Limpiar Campos 🗑️</button>
            <button id="btnOpenSettings" class="btn-secondary" onclick="toggleModal(true)">⚙️ Configurar IA / Prompt</button>
        </div>
    </main>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="toggleModal(false)">&times;</span>
            <h2>Configuración del Motor de IA</h2>
            <p class="modal-instruction">Modifica las credenciales y las instrucciones que recibe la IA para alterar el texto.</p>
            
            <div class="form-group">
                <label for="apiKey">Google Gemini API Key:</label>
                <input type="password" id="apiKey" placeholder="Pega tu API Key aquí...">
            </div>

            <div class="form-group">
                <label for="systemPrompt">Indicaciones del Sistema (System Prompt):</label>
                <textarea id="systemPrompt" rows="10" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e0; font-family: inherit; font-size: 10pt; resize: vertical;">
                Actúa como un asesor metodológico de tesis y corrector de estilo experto en universidades peruanas. Tu único objetivo es reescribir el texto académico provisto para eliminar cualquier huella de Inteligencia Artificial (patrones predecibles de ChatGPT) y asegurar que sea indetectable por Turnitin, manteniendo intacto el fondo de la investigación, las variables y el rigor científico.

                Aplica estrictamente las siguientes reglas de redacción:
                1. Estilo Universitario Peruano: Utiliza una prosa científica formal, clara y objetiva, alineada al manual APA vigente. Evita términos redundantes o introducciones innecesarias.
                2. Vocabulario Humano y Natural: Elimina por completo los clichés y muletillas típicas que delatan a ChatGPT, tales como: "en resumen", "crucial", "remarcable", "es fundamental destacar", "por un lado / por otro lado", "en conclusión", o adjetivos exagerados. Usa conectores lógicos variados y fluidos.
                3. Ritmo de Escritura Variable (Burstiness): Destruye las estructuras de oraciones simétricas. Combina párrafos con oraciones explicativas largas (revisión de literatura) seguidas de frases de impacto directas y cortas. Esto imita el pensamiento humano real.
                4. PROTECCIÓN ESTRICTA DE CITAS APA: Identifica y mantén exactamente igual cualquier estructura de citación académica, ya sean parentéticas o narrativas (ej. "(Pérez, 2022)", "según Ramírez (2021, p. 45)", "Fernández et al."). No cambies los apellidos, los años, ni los conectores que introducen la cita.
                5. Formato de Salida: Entrega ÚNICAMENTE el texto reescrito. No agregues saludos, explicaciones, ni notas de "Aquí tienes el texto".
                </textarea>
            </div>

            <button class="btn-primary" onclick="toggleModal(false)">Guardar y Cerrar</button>
        </div>
    </div>


    <script src="config.js"></script>
    
    <script src="js/app.js"></script>
</body>
</html>
